<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Age of War - Đại Chiến Bản Rộng</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 5px;
            user-select: none;
            overflow: hidden;
        }
        h2 { margin: 2px 0; font-size: 18px; color: #f1c40f; }
        #goldDisplay { font-size: 16px; font-weight: bold; color: #f39c12; margin-bottom: 5px; }
        
        /* Khung chứa canvas để quản lý giao diện */
        .game-container { position: relative; display: inline-block; }
        
        canvas {
            background: #2e3d52;
            display: block;
            margin: 0 auto;
            border: 3px solid #4a6572;
            border-radius: 8px;
            max-width: 100%;
        }

        /* Màn hình Menu và Game Over vẽ bằng HTML đè lên canvas */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            z-index: 10;
        }
        .overlay h1 { color: #f1c40f; margin-bottom: 15px; font-size: 24px; }
        .overlay p { font-size: 14px; margin-bottom: 20px; color: #bdc3c7; }

        .controls {
            margin-top: 8px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        button {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: bold;
            background-color: #f9aa33;
            color: #232f34;
            border: none;
            border-radius: 12px;
            box-shadow: 0 3px #d78510;
        }
        button:active { box-shadow: 0 1px #d78510; transform: translateY(2px); }
        button:disabled { background-color: #7f8c8d; box-shadow: 0 3px #595959; color: #d5dbdb; }
        
        .vip-btn { background-color: #9b59b6; color: white; box-shadow: 0 3px #6c3483; }
        .skill-btn { background-color: #e74c3c; color: white; box-shadow: 0 3px #962d22; }
    </style>
</head>
<body>

    <h2>KỶ NGUYÊN CHIẾN TRANH</h2>
    <div id="goldDisplay">Tài sản: 50$</div>
    
    <div class="game-container">
        <div id="startScreen" class="overlay">
            <h1>AGE OF WAR</h1>
            <p>Sử dụng ngón tay vuốt ngang để kéo xem toàn bản đồ</p>
            <button onclick="startGame()" style="font-size: 18px; padding: 12px 30px;">BẮT ĐẦU PLAY</button>
        </div>

        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h1 id="endResultText">CHIẾN THẮNG</h1>
            <button onclick="restartGame()" style="font-size: 16px; padding: 10px 25px;">CHƠI LẠI (RESTART)</button>
        </div>

        <canvas id="gameCanvas" width="400" height="200"></canvas>
    </div>
    
    <div class="controls">
        <button id="btn-warrior" onclick="spawnUnit('warrior')">Binh (10$)</button>
        <button id="btn-archer" onclick="spawnUnit('archer')">Cung (15$)</button>
        <button id="btn-duybeo" class="vip-btn" onclick="spawnUnit('duybeo')">duybeo (50$)</button>
        <button id="btn-skill" class="skill-btn" onclick="activateArrowRain()">Mưa Tên (Cooldowm)</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Cấu hình thế giới rộng gấp đôi màn hình nhìn thấy
        const worldWidth = 800; 
        let cameraX = 0; // Vị trí ống kính camera hiện tại
        
        let gameState = 'menu'; // menu, playing, gameover
        let gold = 50;
        let playerBaseHp = 500;
        let enemyBaseHp = 500;
        const maxBaseHp = 500;
        
        let myArmy = [];
        let enemyArmy = [];
        let shellProjectiles = []; // Đạn pháo thủ thành
        let spawnTimer = 0;

        // Biến phục vụ tính năng Mưa tên
        let arrowRainActive = false;
        let arrowRainTimer = 0;
        let arrowRainCooldown = 0;
        let visualArrows = []; // Chứa các mũi tên vẽ hiệu ứng rớt xuống

        // Biến phục vụ tính năng Pháo thủ thành tự động
        let turretCooldown = 0;

        // --- CƠ CHẾ VUỐT/KÉO MÀN HÌNH BẰNG ĐIỆN THOẠI ---
        let isDragging = false;
        let startX = 0;

        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDragging || gameState !== 'playing') return;
            let currentX = e.touches[0].clientX;
            let diffX = currentX - startX;
            
            // Di chuyển camera ngược hướng vuốt (kéo màn hình tự nhiên)
            cameraX -= diffX * 1.5; 
            
            // Giới hạn camera không chạy ra ngoài biên bản đồ
            if (cameraX < 0) cameraX = 0;
            if (cameraX > worldWidth - canvas.width) cameraX = worldWidth - canvas.width;
            
            startX = currentX;
        });

        canvas.addEventListener('touchend', () => { isDragging = false; });

        // --- ĐIỀU KHIỂN TRẠNG THÁI GAME ---
        function startGame() {
            document.getElementById("startScreen").style.display = "none";
            gameState = 'playing';
        }

        function restartGame() {
            // Reset lại toàn bộ thông số
            gold = 50;
            playerBaseHp = 500;
            enemyBaseHp = 500;
            myArmy = [];
            enemyArmy = [];
            shellProjectiles = [];
            visualArrows = [];
            spawnTimer = 0;
            cameraX = 0;
            arrowRainActive = false;
            arrowRainTimer = 0;
            arrowRainCooldown = 0;
            turretCooldown = 0;
            
            document.getElementById("gameOverScreen").style.display = "none";
            updateGoldDisplay();
            gameState = 'playing';
        }

        function triggerGameOver(result) {
            gameState = 'gameover';
            const screen = document.getElementById("gameOverScreen");
            const txt = document.getElementById("endResultText");
            screen.style.display = "flex";
            if (result === 'win') {
                txt.innerText = "CHIẾN THẮNG 🎉";
                txt.style.color = "#2ecc71";
            } else {
                txt.innerText = "THẤT BẠI ☠️";
                txt.style.color = "#e74c3c";
            }
        }

        // --- MUA QUÂN & KỸ NĂNG ---
        function spawnUnit(type) {
            if (gameState !== 'playing') return;

            if (type === 'warrior' && gold >= 10) {
                gold -= 10;
                myArmy.push({ x: 60, hp: 100, maxHp: 100, speed: 1, damage: 0.6, color: "#3498db", size: 15, height: 35 });
            } else if (type === 'archer' && gold >= 15) {
                gold -= 15;
                myArmy.push({ x: 60, hp: 60, maxHp: 60, speed: 0.8, damage: 0.4, color: "#2ecc71", size: 12, height: 30 });
            } else if (type === 'duybeo' && gold >= 50) {
                gold -= 50;
                myArmy.push({ x: 60, hp: 300, maxHp: 300, speed: 0.5, damage: 1.6, color: "#e67e22", size: 28, height: 60 });
            }
            updateGoldDisplay();
        }

        function spawnEnemy() {
            if (Math.random() > 0.3) {
                enemyArmy.push({ x: 740, hp: 90, maxHp: 90, speed: -1, damage: 0.5, color: "#e74c3c", size: 15, height: 35 });
            } else {
                enemyArmy.push({ x: 740, hp: 200, maxHp: 200, speed: -0.6, damage: 1.2, color: "#c0392b", size: 22, height: 50 });
            }
        }

        function activateArrowRain() {
            if (arrowRainCooldown > 0 || gameState !== 'playing') return;
            arrowRainActive = true;
            arrowRainTimer = 300; // 5 giây (60fps * 5)
            arrowRainCooldown = 900; // 15 giây hồi chiêu
        }

        function updateGoldDisplay() {
            document.getElementById("goldDisplay").innerText = "Tài sản: " + Math.floor(gold) + "$";
            
            // Bật/tắt nút dựa trên số tiền hiện có
            document.getElementById("btn-warrior").disabled = gold < 10;
            document.getElementById("btn-archer").disabled = gold < 15;
            document.getElementById("btn-duybeo").disabled = gold < 50;
            document.getElementById("btn-skill").disabled = arrowRainCooldown > 0;
            if(arrowRainCooldown > 0) {
                document.getElementById("btn-skill").innerText = `Mưa Tên (${Math.ceil(arrowRainCooldown/60)}s)`;
            } else {
                document.getElementById("btn-skill").innerText = "Mưa Tên (FREE)";
            }
        }

        // --- VÒNG LẶP CHÍNH CỦA GAME ---
        function gameLoop() {
            if (gameState === 'playing') {
                // Tăng tiền theo thời gian
                spawnTimer++;
                if (spawnTimer % 60 === 0) { gold += 4; updateGoldDisplay(); }
                if (spawnTimer % 160 === 0) spawnEnemy();

                // Đếm hồi chiêu chiêu thức Mưa Tên
                if (arrowRainCooldown > 0) { arrowRainCooldown--; if(arrowRainCooldown === 0) updateGoldDisplay(); }

                // --- XỬ LÝ KỸ NĂNG MƯA TÊN (TỒN TẠI 5 GIÂY) ---
                if (arrowRainActive) {
                    arrowRainTimer--;
                    // Tạo hiệu ứng mũi tên rơi ngẫu nhiên trên màn hình
                    if (Math.random() < 0.4) {
                        visualArrows.push({ x: cameraX + Math.random() * canvas.width, y: -10, speed: 6 });
                    }
                    // Gây sát thương liên tục lên TOÀN BỘ quân địch
                    enemyArmy.forEach(enemy => { enemy.hp -= 0.2; });
                    
                    if (arrowRainTimer <= 0) arrowRainActive = false;
                }

                // Cập nhật vị trí các mũi tên rơi (Visual)
                visualArrows.forEach(arrow => arrow.y += arrow.speed);
                visualArrows = visualArrows.filter(arrow => arrow.y < 200);

                // --- CƠ CHẾ PHÁO THỦ THÀNH TỰ ĐỘNG ---
                if (turretCooldown > 0) turretCooldown--;
                if (turretCooldown === 0 && enemyArmy.length > 0) {
                    // Tìm lính địch đi gần thành ta nhất
                    let targetEnemy = null;
                    let minX = 9999;
                    enemyArmy.forEach(e => { if(e.x < minX) { minX = e.x; targetEnemy = e; } });

                    // Nếu địch tiến vào tầm bắn tầm 350px từ thành
                    if (targetEnemy && targetEnemy.x < 350) {
                        shellProjectiles.push({ x: 50, y: 80, targetX: targetEnemy.x, speed: 4 });
                        turretCooldown = 90; // 1.5 giây bắn 1 viên pháo
                    }
                }

                // Cập nhật đạn pháo bay
                shellProjectiles.forEach(shell => {
                    let dx = shell.targetX - shell.x;
                    if (Math.abs(dx) < 5) {
                        // Pháo chạm mục tiêu -> Nổ lan gây sát thương lớn
                        enemyArmy.forEach(enemy => {
                            if (Math.abs(enemy.x - shell.targetX) < 40) enemy.hp -= 40; // Gây 40 sát thương nổ lan
                        });
                        shell.deleteMe = true;
                    } else {
                        shell.x += (dx > 0 ? 1 : -1) * shell.speed;
                        // Tạo đường cung bay lên trời cho đẹp mắt
                        shell.y = 80 - Math.sin((shell.x - 50)/(shell.targetX - 50) * Math.PI) * 30;
                    }
                });
                shellProjectiles = shellProjectiles.filter(s => !s.deleteMe);

                // --- XỬ LÝ QUÂN TA ---
                myArmy.forEach((unit) => {
                    let hasEnemyAhead = enemyArmy.some(enemy => Math.abs(enemy.x - unit.x) < 22);
                    let hitEnemyBase = (unit.x >= 740);

                    if (!hasEnemyAhead && !hitEnemyBase) {
                        unit.x += unit.speed; 
                    } else if (hasEnemyAhead) {
                        enemyArmy.forEach(enemy => { if (Math.abs(enemy.x - unit.x) < 22) enemy.hp -= unit.damage; });
                    } else if (hitEnemyBase) {
                        enemyBaseHp -= unit.damage;
                        if (enemyBaseHp <= 0) triggerGameOver('win');
                    }
                });

                // --- XỬ LÝ QUÂN ĐỊCH ---
                enemyArmy.forEach((enemy) => {
                    let hasPlayerAhead = myArmy.some(unit => Math.abs(enemy.x - unit.x) < 22);
                    let hitPlayerBase = (enemy.x <= 60);

                    if (!hasPlayerAhead && !hitPlayerBase) {
                        enemy.x += enemy.speed;
                    } else if (hasPlayerAhead) {
                        myArmy.forEach(unit => { if (Math.abs(enemy.x - unit.x) < 22) unit.hp -= enemy.damage; });
                    } else if (hitPlayerBase) {
                        playerBaseHp -= enemy.damage;
                        if (playerBaseHp <= 0) triggerGameOver('lose');
                    }
                });

                // Thưởng tiền khi diệt địch
                let deadEnemies = enemyArmy.filter(e => e.hp <= 0);
                if (deadEnemies.length > 0) { gold += deadEnemies.length * 15; updateGoldDisplay(); }

                // Lọc lính chết
                myArmy = myArmy.filter(u => u.hp > 0);
                enemyArmy = enemyArmy.filter(e => e.hp > 0);
            }

            // --- VẼ ĐỒ HỌA LÊN CANVAS (Dựa theo CameraX) ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, 0); // Di chuyển toàn bộ thế giới theo vị trí Camera

            // Vẽ mặt đất bãi cỏ
            ctx.fillStyle = "#1e272e"; ctx.fillRect(0, 160, worldWidth, 40);

            // Vẽ Thành lũy 2 bên (Đẩy xa nhau ra tận biên 800px)
            ctx.fillStyle = "#7f8c8d"; ctx.fillRect(0, 50, 60, 110); // Thành ta
            ctx.fillStyle = "#95a5a6"; ctx.fillRect(740, 50, 60, 110); // Thành địch

            // Vẽ Tháp pháo thủ thành trên nóc thành ta
            ctx.fillStyle = "#34495e"; ctx.fillRect(40, 70, 20, 15);
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(35, 65, 30, 5);

            // Vẽ thanh máu Thành Ta & Thành Địch lớn, rõ ràng hơn
            ctx.fillStyle = "red"; ctx.fillRect(10, 35, 100, 6);
            ctx.fillStyle = "green"; ctx.fillRect(10, 35, (playerBaseHp / maxBaseHp) * 100, 6);

            ctx.fillStyle = "red"; ctx.fillRect(690, 35, 100, 6);
            ctx.fillStyle = "green"; ctx.fillRect(690, 35, (enemyBaseHp / maxBaseHp) * 100, 6);

            // Vẽ quân ta
            myArmy.forEach((unit) => {
                ctx.fillStyle = "red"; ctx.fillRect(unit.x - 2, 150 - unit.height, 20, 3);
                ctx.fillStyle = "green"; ctx.fillRect(unit.x - 2, 150 - unit.height, (unit.hp / unit.maxHp) * 20, 3);
                ctx.fillStyle = unit.color; ctx.fillRect(unit.x, 160 - unit.height, unit.size, unit.height);
            });

            // Vẽ quân địch
            enemyArmy.forEach((enemy) => {
                ctx.fillStyle = "red"; ctx.fillRect(enemy.x - 2, 150 - enemy.height, 20, 3);
                ctx.fillStyle = "green"; ctx.fillRect(enemy.x - 2, 150 - enemy.height, (enemy.hp / enemy.maxHp) * 20, 3);
                ctx.fillStyle = enemy.color; ctx.fillRect(enemy.x, 160 - enemy.height, enemy.size, enemy.height);
            });

            // Vẽ hiệu ứng đạn pháo bay
            shellProjectiles.forEach(shell => {
                ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(shell.x, shell.y, 5, 0, Math.PI*2); ctx.fill();
            });

            // Vẽ hiệu ứng mưa tên rơi xuống
            ctx.strokeStyle = "#e67e22"; ctx.lineWidth = 2;
            visualArrows.forEach(arrow => {
                ctx.beginPath(); ctx.moveTo(arrow.x, arrow.y); ctx.lineTo(arrow.x - 3, arrow.y + 10); ctx.stroke();
            });

            ctx.restore(); // Khôi phục lại trạng thái vẽ bình thường không bị lệch camera

            requestAnimationFrame(gameLoop);
        }

        // Bắt đầu chạy vòng lặp game vẽ hình liên tục
        gameLoop();
    </script>
</body>
</html>

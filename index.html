<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Age of War - Siêu Cấp Nâng Cấp</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 5px;
            user-select: none;
            overflow: hidden;
        }
        h2 { margin: 2px 0; font-size: 18px; color: #f1c40f; }
        #goldDisplay { font-size: 16px; font-weight: bold; color: #f39c12; margin-bottom: 2px; }
        
        /* Giao diện hệ thống hàng chờ mua lính */
        #queueContainer {
            margin: 2px auto 6px auto;
            max-width: 400px;
            background: #34495e;
            padding: 4px;
            border-radius: 6px;
            font-size: 12px;
        }
        #queueSlots { font-weight: bold; color: #ecf0f1; margin-bottom: 2px; }
        #queueBarContainer {
            width: 100%; height: 6px; background-color: #2c3e50; border-radius: 3px; overflow: hidden;
        }
        #queueProgressBar { width: 0%; height: 100%; background-color: #2ecc71; transition: width 0.1s linear; }

        .game-container { position: relative; display: inline-block; }
        canvas {
            background: #2e3d52;
            display: block;
            margin: 0 auto;
            border: 3px solid #4a6572;
            border-radius: 8px;
            max-width: 100%;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            z-index: 10;
        }
        .overlay h1 { color: #f1c40f; margin-bottom: 15px; font-size: 24px; }
        .overlay p { font-size: 14px; margin-bottom: 20px; color: #bdc3c7; }

        .controls {
            margin-top: 5px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        button {
            padding: 10px 11px;
            font-size: 12px;
            font-weight: bold;
            background-color: #f9aa33;
            color: #232f34;
            border: none;
            border-radius: 12px;
            box-shadow: 0 3px #d78510;
        }
        button:active { box-shadow: 0 1px #d78510; transform: translateY(2px); }
        button:disabled { background-color: #7f8c8d; box-shadow: 0 3px #595959; color: #d5dbdb; }
        
        .vip-btn { background-color: #e67e22; color: white; box-shadow: 0 3px #d35400; }
        .thayghien-btn { background-color: #9b59b6; color: white; box-shadow: 0 3px #8e44ad; }
        .skill-btn { background-color: #e74c3c; color: white; box-shadow: 0 3px #962d22; }
    </style>
</head>
<body>

    <h2>KỶ NGUYÊN CHIẾN TRANH</h2>
    <div id="goldDisplay">Tài sản: 50$</div>
    
    <div id="queueContainer">
        <div id="queueSlots">Hàng chờ: [ ] [ ] [ ] [ ]</div>
        <div id="queueBarContainer"><div id="queueProgressBar"></div></div>
    </div>
    
    <div class="game-container">
        <div id="startScreen" class="overlay">
            <h1>AGE OF WAR</h1>
            <p>Vuốt ngang màn hình bãi cỏ để di chuyển góc nhìn</p>
            <button onclick="startGame()" style="font-size: 18px; padding: 12px 30px;">BẮT ĐẦU PLAY</button>
        </div>

        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h1 id="endResultText">CHIẾN THẮNG</h1>
            <button onclick="restartGame()" style="font-size: 16px; padding: 10px 25px;">CHƠI LẠI (RESTART)</button>
        </div>

        <canvas id="gameCanvas" width="400" height="200"></canvas>
    </div>
    
    <div class="controls">
        <button id="btn-warrior" onclick="buyUnit('warrior')">Binh (10$)</button>
        <button id="btn-archer" onclick="buyUnit('archer')">Cung (15$)</button>
        <button id="btn-thayghien" class="thayghien-btn" onclick="buyUnit('thayghien')">thay ghiện (35$)</button>
        <button id="btn-duybeo" class="vip-btn" onclick="buyUnit('duybeo')">duybeo (50$)</button>
        <button id="btn-skill" class="skill-btn" onclick="activateArrowRain()">Mưa Tên (Hồi chiêu)</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const worldWidth = 800; 
        let cameraX = 0; 
        
        let gameState = 'menu'; 
        let gold = 50;
        let playerBaseHp = 500;
        let enemyBaseHp = 500;
        const maxBaseHp = 500;
        
        let myArmy = [];
        let enemyArmy = [];
        let shellProjectiles = []; 
        let spawnTimer = 0;

        // Cấu hình các loại lính
        const unitConfigs = {
            warrior: { price: 10, hp: 100, maxHp: 100, speed: 1, damage: 0.6, color: "#3498db", size: 15, height: 35, trainTime: 90 }, // 1.5 giây
            archer: { price: 15, hp: 60, maxHp: 60, speed: 0.8, damage: 0.4, color: "#2ecc71", size: 12, height: 30, trainTime: 120 }, // 2 giây
            thayghien: { price: 35, hp: 140, maxHp: 140, speed: 0.7, damage: 0.3, color: "#9b59b6", size: 16, height: 42, trainTime: 180 }, // 3 giây
            duybeo: { price: 50, hp: 300, maxHp: 300, speed: 0.5, damage: 1.6, color: "#e67e22", size: 28, height: 60, trainTime: 300 }   // 5 giây
        };

        // Hệ thống hàng chờ mua lính
        let spawnQueue = []; 
        let currentTrainTimer = 0;

        // Biến kỹ năng Mưa tên
        let arrowRainActive = false;
        let arrowRainTimer = 0;
        let arrowRainCooldown = 0;
        let visualArrows = []; 

        // Biến Pháo thủ thành tự động
        let turretCooldown = 0;

        // --- CƠ CHẾ VUỐT MÀN HÌNH ---
        let isDragging = false;
        let startX = 0;

        canvas.addEventListener('touchstart', (e) => { isDragging = true; startX = e.touches[0].clientX; });
        canvas.addEventListener('touchmove', (e) => {
            if (!isDragging || gameState !== 'playing') return;
            let currentX = e.touches[0].clientX;
            let diffX = currentX - startX;
            cameraX -= diffX * 1.5; 
            if (cameraX < 0) cameraX = 0;
            if (cameraX > worldWidth - canvas.width) cameraX = worldWidth - canvas.width;
            startX = currentX;
        });
        canvas.addEventListener('touchend', () => { isDragging = false; });

        // --- QUẢN LÝ TRẠNG THÁI ---
        function startGame() {
            document.getElementById("startScreen").style.display = "none";
            gameState = 'playing';
        }

        function restartGame() {
            gold = 50; playerBaseHp = 500; enemyBaseHp = 500;
            myArmy = []; enemyArmy = []; shellProjectiles = []; visualArrows = []; spawnQueue = [];
            spawnTimer = 0; cameraX = 0; currentTrainTimer = 0;
            arrowRainActive = false; arrowRainTimer = 0; arrowRainCooldown = 0; turretCooldown = 0;
            
            document.getElementById("gameOverScreen").style.display = "none";
            updateGoldDisplay();
            gameState = 'playing';
        }

        function triggerGameOver(result) {
            gameState = 'gameover';
            document.getElementById("gameOverScreen").style.display = "flex";
            document.getElementById("endResultText").innerText = result === 'win' ? "CHIẾN THẮNG 🎉" : "THẤT BẠI ☠️";
            document.getElementById("endResultText").style.color = result === 'win' ? "#2ecc71" : "#e74c3c";
        }

        // --- XỬ LÝ HÀNG CHỜ VÀ MỤC LÍNH ---
        function buyUnit(type) {
            if (gameState !== 'playing') return;
            let conf = unitConfigs[type];
            
            // Kiểm tra tiền và giới hạn hàng chờ tối đa 4 slot
            if (gold >= conf.price && spawnQueue.length < 4) {
                gold -= conf.price;
                spawnQueue.push(type);
                
                // Nếu đây là lính đầu tiên trong hàng chờ, kích hoạt bộ đếm thời gian
                if (spawnQueue.length === 1) {
                    currentTrainTimer = conf.trainTime;
                }
                updateGoldDisplay();
            }
        }

        function spawnEnemy() {
            if (Math.random() > 0.3) {
                enemyArmy.push({ x: 740, hp: 90, maxHp: 90, speed: -1, damage: 0.5, color: "#e74c3c", size: 15, height: 35, type: 'normal' });
            } else {
                enemyArmy.push({ x: 740, hp: 200, maxHp: 200, speed: -0.6, damage: 1.2, color: "#c0392b", size: 22, height: 50, type: 'giant' });
            }
        }

        function activateArrowRain() {
            if (arrowRainCooldown > 0 || gameState !== 'playing') return;
            arrowRainActive = true;
            arrowRainTimer = 300; // 5 giây dội mưa tên
            arrowRainCooldown = 600; // 10 giây hồi chiêu (60fps * 10)
        }

        function updateGoldDisplay() {
            document.getElementById("goldDisplay").innerText = "Tài sản: " + Math.floor(gold) + "$";
            
            // Khóa nút nếu không đủ tiền HOẶC hàng chờ đã đầy 4 slot
            let queueFull = spawnQueue.length >= 4;
            document.getElementById("btn-warrior").disabled = gold < 10 || queueFull;
            document.getElementById("btn-archer").disabled = gold < 15 || queueFull;
            document.getElementById("btn-thayghien").disabled = gold < 35 || queueFull;
            document.getElementById("btn-duybeo").disabled = gold < 50 || queueFull;
            
            document.getElementById("btn-skill").disabled = arrowRainCooldown > 0;
            if(arrowRainCooldown > 0) {
                document.getElementById("btn-skill").innerText = `Mưa Tên (${Math.ceil(arrowRainCooldown/60)}s)`;
            } else {
                document.getElementById("btn-skill").innerText = "Mưa Tên (FREE)";
            }

            // Cập nhật text hiển thị 4 ô Slot hàng chờ
            let slotsText = "Hàng chờ: ";
            for (let i = 0; i < 4; i++) {
                if (i < spawnQueue.length) {
                    let name = "Binh";
                    if (spawnQueue[i] === 'archer') name = "Cung";
                    if (spawnQueue[i] === 'thayghien') name = "Nghiện";
                    if (spawnQueue[i] === 'duybeo') name = "DuyBéo";
                    slotsText += `[${name}] `;
                } else {
                    slotsText += "[ ] ";
                }
            }
            document.getElementById("queueSlots").innerText = slotsText;
        }

        // --- VÒNG LẶP CHÍNH ---
        function gameLoop() {
            if (gameState === 'playing') {
                spawnTimer++;
                if (spawnTimer % 60 === 0) { gold += 4; updateGoldDisplay(); }
                if (spawnTimer % 160 === 0) spawnEnemy();

                if (arrowRainCooldown > 0) { arrowRainCooldown--; if(arrowRainCooldown === 0) updateGoldDisplay(); }

                // --- XỬ LÝ THANH COOLDOWN CỦA HÀNG CHỜ MUA QUÂN ---
                if (spawnQueue.length > 0) {
                    currentTrainTimer--;
                    let currentType = spawnQueue[0];
                    let maxTime = unitConfigs[currentType].trainTime;
                    let percent = ((maxTime - currentTrainTimer) / maxTime) * 100;
                    document.getElementById("queueProgressBar").style.width = percent + "%";

                    if (currentTrainTimer <= 0) {
                        // Huấn luyện xong -> Xuất binh ra chiến trường
                        let conf = unitConfigs[currentType];
                        let newUnit = { 
                            x: 60, hp: conf.hp, maxHp: conf.maxHp, speed: conf.speed, 
                            damage: conf.damage, color: conf.color, size: conf.size, 
                            height: conf.height, type: currentType 
                        };
                        if (currentType === 'thayghien') newUnit.abilityTimer = 0; // Thêm bộ đếm kỹ năng riêng cho Thầy Nghiện
                        
                        myArmy.push(newUnit);
                        
                        // Xóa khỏi hàng chờ, chuyển sang con kế tiếp
                        spawnQueue.shift();
                        updateGoldDisplay();
                        if (spawnQueue.length > 0) {
                            currentTrainTimer = unitConfigs[spawnQueue[0]].trainTime;
                        }
                    }
                } else {
                    document.getElementById("queueProgressBar").style.width = "0%";
                }

                // --- XỬ LÝ MƯA TÊN (SÁT THƯƠNG TĂNG MẠNH) ---
                if (arrowRainActive) {
                    arrowRainTimer--;
                    if (Math.random() < 0.5) visualArrows.push({ x: cameraX + Math.random() * canvas.width, y: -10, speed: 7 });
                    // Tăng sát thương dội xuống lính địch lên 1.4 mỗi frame (rất đau)
                    enemyArmy.forEach(enemy => { enemy.hp -= 1.4; });
                    if (arrowRainTimer <= 0) arrowRainActive = false;
                }
                visualArrows.forEach(arrow => arrow.y += arrow.speed);
                visualArrows = visualArrows.filter(arrow => arrow.y < 200);

                // --- PHÁO THỦ THÀNH TỰ ĐỘNG (KIỂM TRA VA CHẠM THỰC TẾ) ---
                if (turretCooldown > 0) turretCooldown--;
                if (turretCooldown === 0 && enemyArmy.length > 0) {
                    // Kiểm tra xem có địch lọt vào vùng phòng thủ dưới 450px không
                    let hasEnemyInRanges = enemyArmy.some(e => e.x < 450);
                    if (hasEnemyInRanges) {
                        shellProjectiles.push({ x: 60, y: 80, speed: 4.5 }); // Bắn đạn pháo đi
                        turretCooldown = 110; 
                    }
                }

                // Cập nhật đạn pháo di chuyển sang phải
                shellProjectiles.forEach(shell => {
                    shell.x += shell.speed;
                    // Tạo vòng cung bay thực tế
                    shell.y = 80 - Math.sin((shell.x - 60) / 350 * Math.PI) * 45;
                    if(shell.y > 160) shell.y = 160;

                    // KIỂM TRA VA CHẠM THỰC TẾ: Đạn pháo chạm trúng lính địch bất kỳ
                    let hitEnemy = enemyArmy.find(enemy => Math.abs(enemy.x - shell.x) < 15);
                    
                    if (hitEnemy || shell.x > worldWidth) {
                        if (hitEnemy) {
                            // Trúng địch -> Phát nổ gây sát thương lan 45 HP trong phạm vi 50px
                            enemyArmy.forEach(e => {
                                if (Math.abs(e.x - shell.x) < 50) e.hp -= 45;
                            });
                        }
                        shell.deleteMe = true; // Biến mất sau khi nổ trúng địch
                    }
                });
                shellProjectiles = shellProjectiles.filter(s => !s.deleteMe);

                // Mảng tạm để lưu lính do "Thầy Nghiện" đẻ ra giữa đường, tránh lỗi vòng lặp
                let babyWarriors = [];

                // --- CẬP NHẬT QUÂN TA ---
                myArmy.forEach((unit) => {
                    let hasEnemyAhead = enemyArmy.some(enemy => Math.abs(enemy.x - unit.x) < 22);
                    let hitEnemyBase = (unit.x >= 740);

                    if (!hasEnemyAhead && !hitEnemyBase) {
                        unit.x += unit.speed; 
                    } else if (hasEnemyAhead) {
                        enemyArmy.forEach(enemy => { if (Math.abs(enemy.x - unit.x) < 22) enemy.hp -= unit.damage; });
                    } else if (hitEnemyBase) {
                        enemyBaseHp -= unit.damage;
                        if (enemyBaseHp <= 0) triggerGameOver('win');
                    }

                    // NỘI TẠI CỦA THẦY NGHIỆN: Mỗi 6 giây (360 frames) đẻ 1 chiến binh
                    if (unit.type === 'thayghien') {
                        unit.abilityTimer++;
                        if (unit.abilityTimer >= 360) {
                            unit.abilityTimer = 0;
                            // Tạo ra một chiến binh nhỏ đi ngay trước mặt Thầy Nghiện
                            babyWarriors.push({ 
                                x: unit.x + 10, hp: 100, maxHp: 100, speed: 1, 
                                damage: 0.6, color: "#3498db", size: 15, height: 35, type: 'warrior' 
                            });
                        }
                    }
                });

                // Gom lính Thầy Nghiện đẻ ra vào đội hình chính
                if(babyWarriors.length > 0) {
                    myArmy = myArmy.concat(babyWarriors);
                }

                // --- CẬP NHẬT QUÂN ĐỊCH ---
                enemyArmy.forEach((enemy) => {
                    let hasPlayerAhead = myArmy.some(unit => Math.abs(enemy.x - unit.x) < 22);
                    let hitPlayerBase = (enemy.x <= 60);

                    if (!hasPlayerAhead && !hitPlayerBase) {
                        enemy.x += enemy.speed;
                    } else if (hasPlayerAhead) {
                        myArmy.forEach(unit => { if (Math.abs(enemy.x - unit.x) < 22) unit.hp -= enemy.damage; });
                    } else if (hitPlayerBase) {
                        playerBaseHp -= enemy.damage;
                        if (playerBaseHp <= 0) triggerGameOver('lose');
                    }
                });

                // Cộng tiền thưởng khi lính địch chết
                let deadEnemies = enemyArmy.filter(e => e.hp <= 0);
                if (deadEnemies.length > 0) { gold += deadEnemies.length * 15; updateGoldDisplay(); }

                myArmy = myArmy.filter(u => u.hp > 0);
                enemyArmy = enemyArmy.filter(e => e.hp > 0);
            }

            // --- VẼ ĐỒ HỌA HỆ THỐNG ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-cameraX, 0); 

            // Mặt đất bãi cỏ
            ctx.fillStyle = "#1e272e"; ctx.fillRect(0, 160, worldWidth, 40);

            // Thành lũy 2 bên
            ctx.fillStyle = "#7f8c8d"; ctx.fillRect(0, 50, 60, 110); 
            ctx.fillStyle = "#95a5a6"; ctx.fillRect(740, 50, 60, 110); 

            // Cốt súng tháp pháo phe mình
            ctx.fillStyle = "#34495e"; ctx.fillRect(40, 70, 20, 15);
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(35, 65, 30, 5);

            // Thanh máu Thành Ta & Địch
            ctx.fillStyle = "red"; ctx.fillRect(10, 35, 100, 6);
            ctx.fillStyle = "green"; ctx.fillRect(10, 35, (playerBaseHp / maxBaseHp) * 100, 6);
            ctx.fillStyle = "red"; ctx.fillRect(690, 35, 100, 6);
            ctx.fillStyle = "green"; ctx.fillRect(690, 35, (enemyBaseHp / maxBaseHp) * 100, 6);

            // Vẽ quân ta
            myArmy.forEach((unit) => {
                ctx.fillStyle = "red"; ctx.fillRect(unit.x - 2, 150 - unit.height, 20, 3);
                ctx.fillStyle = "green"; ctx.fillRect(unit.x - 2, 150 - unit.height, (unit.hp / unit.maxHp) * 20, 3);
                ctx.fillStyle = unit.color; ctx.fillRect(unit.x, 160 - unit.height, unit.size, unit.height);
                
                // Vẽ vòng tròn sáng nhỏ dưới chân Thầy Nghiện để nhận biết năng lực tâm linh đẻ lính
                if(unit.type === 'thayghien') {
                    ctx.fillStyle = "rgba(155, 89, 182, 0.4)";
                    ctx.fillRect(unit.x - 3, 157, unit.size + 6, 3);
                }
            });

            // Vẽ quân địch
            enemyArmy.forEach((enemy) => {
                ctx.fillStyle = "red"; ctx.fillRect(enemy.x - 2, 150 - enemy.height, 20, 3);
                ctx.fillStyle = "green"; ctx.fillRect(enemy.x - 2, 150 - enemy.height, (enemy.hp / enemy.maxHp) * 20, 3);
                ctx.fillStyle = enemy.color; ctx.fillRect(enemy.x, 160 - enemy.height, enemy.size, enemy.height);
            });

            // Vẽ đạn pháo đang bay
            shellProjectiles.forEach(shell => {
                ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(shell.x, shell.y, 5, 0, Math.PI*2); ctx.fill();
            });

            // Vẽ mưa tên
            ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 2.5;
            visualArrows.forEach(arrow => {
                ctx.beginPath(); ctx.moveTo(arrow.x, arrow.y); ctx.lineTo(arrow.x - 2, arrow.y + 12); ctx.stroke();
            });

            ctx.restore(); 
            requestAnimationFrame(gameLoop);
        }

        updateGoldDisplay();
        gameLoop();
    </script>
</body>
</html>
